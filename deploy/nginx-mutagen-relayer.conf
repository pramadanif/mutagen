# Nginx reverse proxy for mutagen-relayer → 127.0.0.1:3091
# vouch-solana-be occupies :3090 on this VPS — do NOT use 3090 here.
#
# Install:
#   sudo cp deploy/nginx-mutagen-relayer.conf /etc/nginx/sites-available/mutagen-relayer
#   sudo ln -sf /etc/nginx/sites-available/mutagen-relayer /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# SSL (first time):
#   sudo certbot --nginx -d mutagen.pramadani.site
#
# After certbot: ensure BOTH server blocks use proxy_pass http://127.0.0.1:3091;

server {
    listen 80;
    server_name mutagen.pramadani.site;

    location / {
        proxy_pass http://127.0.0.1:3091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

